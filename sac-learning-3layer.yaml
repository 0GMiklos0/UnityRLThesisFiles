behaviors:
  MyBehavior:
    trainer_type: sac
    max_steps: 5000000
    time_horizon: 64
    summary_freq: 10000
    hyperparameters:
      batch_size: 128
      buffer_size: 50000
      learning_rate: 3.0e-4 
      init_entcoef: 0.5
      tau: 0.005
      steps_per_update: 15
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0